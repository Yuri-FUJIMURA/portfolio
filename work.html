<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Detail — Yuri FUJIMURA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #050505;
      --bg-secondary: #0a0a0a;
      --bg-card: #0f0f0f;
      --text-primary: #f0f0f0;
      --text-secondary: #a4a4a4;
      --text-muted: #727171;
      --accent: #ffffff;
      --accent-dim: #999999;
      --border: #1a1a1a;
      --border-light: #2a2a2a;
      --font-display: 'Instrument Serif', serif;
      --font-body: 'Zen Kaku Gothic New', sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.8; font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: var(--text-primary); text-decoration: none; transition: opacity 0.3s ease; }
    a:hover { opacity: 0.6; }
    ::selection { background: var(--text-primary); color: var(--bg-primary); }

    .grain-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9998; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 24px 48px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000;
      background: rgba(5, 5, 5, 0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.0rem; font-weight: 400;
      letter-spacing: 0.06em;
    }
    .nav-back {
      font-size: 0.8rem; font-weight: 400;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-secondary); position: relative;
      transition: color 0.3s ease;
    }
    .nav-back:hover { color: var(--text-primary); opacity: 1; }
    .nav-back::before {
      content: '←'; margin-right: 8px;
    }

    /* Detail Content */
    .detail-container {
      max-width: 800px; margin: 0 auto;
      padding: 140px 48px 80px;
      opacity: 0; transform: translateY(30px);
      animation: fadeUp 0.8s ease forwards 0.1s;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-category {
      font-size: 0.72rem; color: var(--text-muted);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .detail-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 400; letter-spacing: 0.02em;
      line-height: 1.2; margin-bottom: 16px;
    }
    .detail-tools {
      font-size: 0.78rem; color: var(--text-muted);
      letter-spacing: 0.06em; margin-bottom: 40px;
    }
    .detail-divider {
      width: 100%; height: 1px; background: var(--border);
      margin-bottom: 40px;
    }

    .detail-hero-image {
      width: 100%; aspect-ratio: 16 / 10;
      background: var(--bg-card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.75rem; letter-spacing: 0.12em;
      margin-bottom: 48px; overflow: hidden;
    }
    .detail-hero-image img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .detail-description {
      font-size: 0.95rem; color: var(--text-secondary);
      line-height: 2; margin-bottom: 40px;
    }
    .detail-description p { margin-bottom: 18px; }

    .detail-links {
      display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 56px;
    }
    .detail-links a {
      font-size: 0.8rem; color: var(--text-primary);
      padding: 10px 24px;
      border: 1px solid var(--border-light);
      letter-spacing: 0.1em;
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .detail-links a:hover {
      border-color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
      opacity: 1;
    }

    /* Image Gallery */
    .detail-gallery {
      margin-bottom: 56px;
    }
    .detail-gallery-item {
      margin-bottom: 32px;
    }
    .detail-gallery-item .gallery-image {
      width: 100%; aspect-ratio: 16 / 10;
      background: var(--bg-card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.75rem; letter-spacing: 0.12em;
      overflow: hidden;
    }
    .detail-gallery-item .gallery-image img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .detail-gallery-item .gallery-caption {
      font-size: 0.78rem; color: var(--text-muted);
      margin-top: 10px; letter-spacing: 0.04em;
    }

    /* Detail Text Sections */
    .detail-section {
      margin-bottom: 48px;
    }
    .detail-section h3 {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 400;
      margin-bottom: 16px; letter-spacing: 0.02em;
    }
    .detail-section p {
      font-size: 0.9rem; color: var(--text-secondary);
      line-height: 2; margin-bottom: 12px;
    }

    /* Prev / Next Navigation */
    .work-nav {
      border-top: 1px solid var(--border);
      padding-top: 48px; margin-top: 48px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 2px;
    }
    .work-nav-item {
      padding: 32px 28px;
      background: var(--bg-card);
      transition: background 0.3s ease;
      display: flex; flex-direction: column; justify-content: center;
    }
    .work-nav-item:hover { background: var(--bg-secondary); }
    .work-nav-item a {
      display: block; color: inherit; text-decoration: none;
    }
    .work-nav-item a:hover { opacity: 1; }
    .work-nav-label {
      font-size: 0.68rem; color: var(--text-muted);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .work-nav-title {
      font-family: var(--font-display);
      font-size: 1.05rem; font-weight: 400;
      letter-spacing: 0.02em;
      transition: color 0.3s ease;
    }
    .work-nav-item:hover .work-nav-title { color: var(--accent); }
    .work-nav-item.next { text-align: right; }

    /* Back to Works link */
    .back-to-works {
      text-align: center; margin-top: 48px; padding-bottom: 24px;
    }
    .back-to-works a {
      font-size: 0.78rem; color: var(--text-muted);
      letter-spacing: 0.15em; text-transform: uppercase;
      padding: 8px 0; position: relative;
      transition: color 0.3s ease;
    }
    .back-to-works a:hover { color: var(--text-primary); opacity: 1; }

    footer {
      text-align: center; padding: 48px;
      border-top: 1px solid var(--border);
      font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.12em;
    }

    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .detail-container { padding: 120px 24px 60px; }
      .work-nav { grid-template-columns: 1fr; }
      .work-nav-item.next { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="grain-overlay"></div>

  <nav>
    <a href="index.html" class="nav-logo">Yuri FUJIMURA</a>
    <a href="index.html#works" class="nav-back">Works</a>
  </nav>

  <div class="detail-container" id="detailContainer">
    <!-- Content populated by JS -->
  </div>

  <footer>&copy;2026 Yuri FUJIMURA</footer>

  <script>
    const works = [
      {
        id: 0,
        category: 'Spatial Audio / Sound Programming',
        title: 'Studies No.1 for Aleatoric Coded Voxels',
        thumbnail: 'ICSAF 2025',
        image: 'img/works/ICSAF.JPG',
        description: 'マルチチャンネルスピーカーの特徴は何か。複数のスピーカーによる定位感と包まれ感ではないだろうか。定位感と包まれ感を音で感じる状態とは、日常の音ではないか。日常の音をサウンドプログラミングで再現し、マルチチャンネルスピーカーで展開するとき、その音響空間は日常を想起させるのか、新たな音響体験となるのか——ステレオスピーカーとマルチチャンネルスピーカー、音を眺める状態から音の中にいる状態へ。7.1.4ch立体電子音響作品。空間を一つのモノラル音場として捉え、単発音による定位感と持続音による包まれ感の両立を試みた。サウンドプログラミングで生成された音素材をDolby Atmosの空間に配置。シンプルなオシレータ、物理モジュールのオシレータ、ハイドロフォンによる録音素材を使用し、異なる質感・遠近・残響を空間全体で表現した。ハイトスピーカーとサラウンドスピーカーにて周波数帯域を制限することで、定位知覚特性を考慮した音響配置を行った。',
        tools: 'SuperCollider / Csound / Logic Pro / Dolby Atmos / Virtuoso',
        links: [
          { label: 'SoundCloud', url: 'https://on.soundcloud.com/bMp8KIsTQWyeq9Cm3h' }
        ],
        images: [],
        sections: []
      },
      {
        id: 1,
        category: 'Immersive Sound',
        title: 'わさわさ',
        thumbnail: 'Tech Design Camp 2025',
        image: 'img/works/TechDsignCamp.jpg',
        description: 'TBS Tech Design Lab主催ハッカソンにて制作。12ch立体音響サウンドを構築し、インスタレーション空間に没入感のある音響体験を実現した。',
        tools: 'Logic Pro / TouchDesigner',
        links: [
          { label: 'YouTube', url: 'https://youtu.be/4BvsFNxWgEI' }
        ],
        images: [],
        sections: []
      },
      {
        id: 2,
        category: 'Voice Recording',
        title: 'ハヤツバサ',
        thumbnail: 'TGS 2025',
        image: 'img/works/VoiceRecording.JPEG',
        description: 'TGS2025出展ゲームのボイス録音・編集を担当。キャラクターのセリフを収録し、ゲームに実装するための編集作業を行った。',
        tools: 'ProTools',
        links: [
          { label: 'ハヤツバサ', url: 'https://mkmlab.net/TGS/2025/team/team01/team01M6.html' }
        ],
        images: [],
        sections: []
      },
      {
        id: 3,
        category: 'Spatial Audio / Sound Programming',
        title: 'CodedSoundScapes',
        thumbnail: 'OTOTEN 2025',
        image: 'img/works/OTOTEN.JPG',
        description: 'サウンドプログラミングによる電子音響でサウンドスケープ表現を目指した7.1.4ch作品。SuperColliderで生成したサウンドをDolby Atmosで空間配置し、自然環境のサウンドスケープを電子音響で再構築した。',
        tools: 'SuperCollider / Logic Pro / Dolby Atmos / Virtuoso',
        links: [
          { label: 'SoundCloud', url: 'https://on.soundcloud.com/CKvoSLLLGVJKUgjDMS' }
        ],
        images: [],
        sections: []
      },
      {
        id: 4,
        category: 'Music / Direction',
        title: 'GGJ TUT 2025',
        thumbnail: 'GGJ 2025',
        image: 'img/works/GGJ2025.jpg',
        description: '配信チームとして制作進行、Creative Directorを務めた。配信BGM・映像も制作し、イベント全体のクリエイティブを統括した。',
        tools: 'Logic Pro / DaVinci Resolve',
        links: [
          { label: '配信アーカイブ', url: 'https://youtube.com/playlist?list=PL04S5xonQiDm2Yc9NbnD7fElksl0YGM91' },
          { label: 'BGM01', url: 'https://soundcloud.com/user-564015150/ggjtut2025_bgm01' },
          { label: 'BGM02', url: 'https://soundcloud.com/user-564015150/ggjtut2025_bgm02' },
          { label: 'OP', url: 'https://soundcloud.com/user-564015150/ggjtut2025_op' }
        ],
        images: [],
        sections: []
      },
      {
        id: 5,
        category: 'Game Sound',
        title: 'Genereviver',
        thumbnail: 'TGS 2024',
        image: 'img/works/Genereviver.jpg',
        description: 'TGS2024出展ゲームのBGMを制作。ゲームの世界観に合わせた楽曲を複数制作し、プレイヤーの没入感を高めるサウンドデザインを行った。',
        tools: 'Logic Pro',
        links: [
          { label: 'Genereviver', url: 'https://mkmlab.net/TGS/2024/game/genereviver.html' },
          { label: 'BGM_StageSelected', url: 'https://on.soundcloud.com/Ysm291hvmrYJ1yuLrh' },
          { label: 'BGM_Title', url: 'https://on.soundcloud.com/u8l9oROM7WgsQKSbDr' },
          { label: 'BGM_StageClear', url: 'https://on.soundcloud.com/wvOcsfJINu3Dk8i3RU' },
          { label: 'BGM_Stage1_mystery', url: 'https://on.soundcloud.com/qlkK3AJk77CG4tT48u' }
        ],
        images: [],
        sections: []
      },
      {
        id: 6,
        category: 'Game Sound',
        title: "Alice's Regain",
        thumbnail: 'TGS 2024',
        image: "img/works/Alice'sRegain.JPEG",
        description: 'TGS2024出展ゲームのBGMを制作。ゲームの世界観に合わせた楽曲制作を担当した。',
        tools: 'Logic Pro',
        links: [
          { label: "Alice's Regain", url: 'https://mkmlab.net/TGS/2024/game/alicesregain.html' },
          { label: 'BGM_FinalBoss_MonsterBird', url: 'https://on.soundcloud.com/rFu9DNjnQj9hfO5DzY' }
        ],
        images: [],
        sections: []
      },
      {
        id: 7,
        category: 'MA',
        title: 'はなだより',
        thumbnail: 'TGS 2024',
        image: 'img/works/hanadayori.jpeg',
        description: 'TGS2024出展ゲームのPVにてMAを担当。映像に合わせた音響ミキシングを行った。',
        tools: 'ProTools',
        links: [
          { label: 'PV', url: 'https://youtu.be/o5OIbKmCJdo' }
        ],
        images: [],
        sections: []
      }
    ];

    function getWorkId() {
      const params = new URLSearchParams(window.location.search);
      return parseInt(params.get('id'), 10) || 0;
    }

    function renderWork(id) {
      const work = works[id];
      if (!work) { window.location.href = 'index.html#works'; return; }

      document.title = work.title + ' — Yuri FUJIMURA';

      let html = '';

      // Hero image area
      html += '<div class="detail-hero-image">';
      if (work.image) {
        html += '<img src="' + work.image + '" alt="' + work.title + '">';
      } else {
        html += work.thumbnail;
      }
      html += '</div>';

      // Category & Title
      html += '<p class="detail-category">' + work.category + '</p>';
      html += '<h1 class="detail-title">' + work.title + '</h1>';
      html += '<p class="detail-tools">' + work.tools + '</p>';
      html += '<div class="detail-divider"></div>';

      // Description
      html += '<div class="detail-description"><p>' + work.description + '</p></div>';

      // Links
      if (work.links.length > 0) {
        html += '<div class="detail-links">';
        work.links.forEach(function(link) {
          html += '<a href="' + link.url + '" target="_blank" rel="noopener">' + link.label + '</a>';
        });
        html += '</div>';
      }

      // Gallery images
      if (work.images.length > 0) {
        html += '<div class="detail-gallery">';
        work.images.forEach(function(img) {
          html += '<div class="detail-gallery-item">';
          html += '<div class="gallery-image">';
          if (img.src) {
            html += '<img src="' + img.src + '" alt="' + (img.caption || '') + '">';
          } else {
            html += img.caption || 'Image';
          }
          html += '</div>';
          if (img.caption) {
            html += '<p class="gallery-caption">' + img.caption + '</p>';
          }
          html += '</div>';
        });
        html += '</div>';
      }

      // Additional text sections
      if (work.sections.length > 0) {
        work.sections.forEach(function(sec) {
          html += '<div class="detail-section">';
          if (sec.heading) html += '<h3>' + sec.heading + '</h3>';
          if (sec.text) html += '<p>' + sec.text + '</p>';
          html += '</div>';
        });
      }

      // Prev / Next navigation
      var prevId = id > 0 ? id - 1 : works.length - 1;
      var nextId = id < works.length - 1 ? id + 1 : 0;
      var prev = works[prevId];
      var next = works[nextId];

      html += '<div class="work-nav">';
      html += '<div class="work-nav-item prev">';
      html += '<a href="work.html?id=' + prevId + '">';
      html += '<p class="work-nav-label">← Prev</p>';
      html += '<p class="work-nav-title">' + prev.title + '</p>';
      html += '</a></div>';
      html += '<div class="work-nav-item next">';
      html += '<a href="work.html?id=' + nextId + '">';
      html += '<p class="work-nav-label">Next →</p>';
      html += '<p class="work-nav-title">' + next.title + '</p>';
      html += '</a></div>';
      html += '</div>';

      // Back to works
      html += '<div class="back-to-works"><a href="index.html#works">← Back to All Works</a></div>';

      document.getElementById('detailContainer').innerHTML = html;
    }

    renderWork(getWorkId());
  </script>
</body>
</html>
